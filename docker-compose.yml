name: project-template-web

services:
  app:
    container_name: project-template-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST}
      # - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_AUTH_LOGIN_URL=${NEXT_PUBLIC_AUTH_LOGIN_URL}
      - NEXT_PUBLIC_AUTH_TOKEN_REFRESH_URL=${NEXT_PUBLIC_AUTH_TOKEN_REFRESH_URL}
      - NEXT_PUBLIC_TOKEN_REFRESH_INTERVAL=${NEXT_PUBLIC_TOKEN_REFRESH_INTERVAL}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge